services:
  agrivision:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrivision-ai:latest
    container_name: agrivision-ai
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist uploaded files (optional)
      - agrivision-uploads:/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s

volumes:
  agrivision-uploads:
